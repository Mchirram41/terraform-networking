name: Terraform CI/CD

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read
  security-events: write

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::998230061098:role/GitHubActionsTerraformRole
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Verify Terraform Installation
        run: terraform version

      - name: Terraform Format Check
        run: terraform fmt -recursive new-tr/

      - name: Terraform Init
        run: terraform -chdir=new-tr/root init

      - name: Terraform Validate
        run: terraform -chdir=new-tr/root validate

      - name: Install TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Initialize TFLint
        working-directory: new-tr/root
        run: tflint --init

      - name: Run TFLint
        working-directory: new-tr/root
        run: tflint

      - name: Run tfsec Security Scan
        uses: tfsec/tfsec-sarif-action@master
        with:
          working_directory: new-tr/root
          sarif_file: new-tr/root/tfsec.sarif
          tfsec_args: >
            --minimum-severity low
            --tfvars-file new-tr/root/terraform.tfvars

      - name: List module directory (diagnostic)
        run: ls -la new-tr/root || true

      - name: Upload tfsec SARIF Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tfsec-sarif-report
          path: new-tr/root/tfsec.sarif

      # ----------------------------
      # Install Python
      # ----------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ----------------------------
      # Install Checkov
      # ----------------------------
      - name: Install Checkov
        run: |
          python -m pip install --upgrade pip
          pip install checkov

      # ----------------------------
      # Run Checkov (No Docker)
      # ----------------------------
      - name: Run Checkov Security Scan
        run: |
          checkov \
            -d new-tr/root \
            --framework terraform \
            --quiet \
            --soft-fail \
            --output sarif \
            --output json \
            --output-file-path new-tr/root/results.sarif,new-tr/root/results.json

      - name: Upload Checkov SARIF Report
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: new-tr/root/results.sarif

      - name: Upload Checkov Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-security-report
          path: |
            new-tr/root/results.sarif
            new-tr/root/results.json
